name: Upload README.md files
on:
  push:
    branches:
      - 'main'
    paths:
      - 'packages/*/README.md'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  upload-readmes:
    name: Upload README.md files
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    if: github.repository_owner == 'marioparaschiv'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        uses: ./packages/actions/src/pnpmCache

      - name: Build dependencies
        run: pnpm --filter @discord.self/actions... run build

      - name: Upload README.md files
        env:
          READMES_STORAGE_ACCESS_KEY_ID: ${{ secrets.READMES_STORAGE_ACCESS_KEY_ID }}
          READMES_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.READMES_STORAGE_SECRET_ACCESS_KEY }}
          READMES_STORAGE_BUCKET: ${{ secrets.READMES_STORAGE_BUCKET }}
          READMES_STORAGE_ENDPOINT: ${{ secrets.READMES_STORAGE_ENDPOINT }}
        uses: ./packages/actions/src/uploadReadmeFiles
