services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.15
    environment:
      MEILI_MASTER_KEY: localdevkey
      MEILI_NO_ANALYTICS: "true"
      MEILI_HTTP_ADDR: 0.0.0.0:7700
      MEILI_HTTP_CORS_ORIGIN: http://localhost:3000
    ports:
      - "7700:7700"
    volumes:
      - ./data/meili:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  bootstrap:
    image: node:24-bookworm
    depends_on:
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      CI: "true"
      CF_R2_DOCS_URL: http://minio:9000
      CF_R2_DOCS_ACCESS_KEY_ID: minioadmin
      CF_R2_DOCS_SECRET_ACCESS_KEY: minioadmin
      CF_R2_DOCS_BUCKET: docs
      CF_R2_DOCS_BUCKET_URL: http://minio:9000/docs
      CF_R2_READMES_URL: http://minio:9000
      CF_R2_READMES_ACCESS_KEY_ID: minioadmin
      CF_R2_READMES_SECRET_ACCESS_KEY: minioadmin
      CF_R2_READMES_BUCKET: docs
      SEARCH_API_URL: http://meilisearch:7700
      SEARCH_API_KEY: localdevkey
      S3_FORCE_PATH_STYLE: "true"
    command: ["/bin/sh", "/workspace/docker/docs-stack/bootstrap.sh"]

  website:
    build:
      context: ../..
      dockerfile: docker/docs-stack/website.Dockerfile
      args:
        NEXT_PUBLIC_SEARCH_API_URL: http://localhost:7700
        NEXT_PUBLIC_SEARCH_API_KEY: localdevkey
    depends_on:
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      VERCEL_ENV: production
      CF_R2_DOCS_BUCKET_URL: http://minio:9000/docs
      CF_R2_README_BUCKET_URL: http://minio:9000/docs
      NEXT_PUBLIC_SEARCH_API_URL: http://localhost:7700
      NEXT_PUBLIC_SEARCH_API_KEY: localdevkey
    ports:
      - "3000:3000"
